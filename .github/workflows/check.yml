name: Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build tokens
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25.9.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all platforms
        run: npm run build

      - name: Check build artifacts are up to date
        run: |
          if ! git diff --exit-code build/; then
            echo ""
            echo "Build artifacts are out of date."
            echo "Run 'npm run build' locally and commit the updated files before pushing."
            exit 1
          fi
